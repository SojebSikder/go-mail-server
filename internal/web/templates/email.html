<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Email - Smail</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <a href="/emails" class="btn btn-link" style="margin-bottom: 20px;">← Back to Inbox</a>

            <div class="card message-card">
                <h1 class="page-title" style="margin-bottom: 16px;">Message Details</h1>

                <div class="message-meta">
                    <div><strong>From:</strong> {{.Email.Sender}}</div>
                    <div><strong>Date:</strong> {{.Email.ReceivedAt.Format "Jan 02, 2006 at 15:04:05"}}</div>
                </div>

                <div class="message-body">{{.Email.Body}}</div>

                <form action="/delete?id={{.Email.ID}}" method="POST" style="border-top: 1px solid var(--border); padding-top: 20px;">
                    <button type="submit" class="btn btn-danger">Delete Message</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
