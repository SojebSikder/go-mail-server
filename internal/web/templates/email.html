<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Email</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f8fafc; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .meta { color: #64748b; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        .body { white-space: pre-wrap; color: #1e293b; line-height: 1.6; }
        .btn { padding: 8px 16px; background:#dc2626; color:white; border:none; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/emails" style="text-decoration:none; color:#2563eb;">← Back to Inbox</a>
        <h2>Message View</h2>
        <div class="meta">
            <strong>From:</strong> {{.Email.Sender}}<br>
            <strong>Date:</strong> {{.Email.ReceivedAt.Format "Jan 02, 2006 15:04:05"}}
        </div>
        <div class="body">{{.Email.Body}}</div>
        <br><hr style="border-color:#f1f5f9"><br>
        <form action="/delete?id={{.Email.ID}}" method="POST">
            <button type="submit" class="btn">Delete Message</button>
        </form>
    </div>
</body>
</html>
