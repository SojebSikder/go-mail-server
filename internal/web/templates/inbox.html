<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Smail</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div>
                <div class="sidebar-header">
                    <h3>Smail Workspace</h3>
                </div>
                <div class="user-badge">
                    Signed in as
                    <strong>{{.User}}</strong>
                </div>
                <nav class="nav-menu">
                    <a href="/emails" class="nav-item active">📥 Inbox</a>
                </nav>
            </div>
            <div style="margin-top: 20px;">
                <a href="/logout" class="nav-item logout">🚪 Log Out</a>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Your Mailbox</h1>
            <div class="card">
                {{range .Emails}}
                <a href="/emails?id={{.ID}}" class="email-item">
                    <span class="sender">{{.Sender}}</span>
                    <span class="subject"><strong>{{.Subject}}</strong></span>
                    <span class="body-preview">
                        {{if .TextBody}}{{.TextBody}}{{else}}HTML Content{{end}}
                    </span>
                    <span class="time">{{.ReceivedAt}}</span>
                </a>
                {{else}}
                <div class="empty-state">
                    <p>No messages inside this workspace mailbox yet.</p>
                </div>
                {{end}}
            </div>
        </main>
    </div>
</body>
</html>
